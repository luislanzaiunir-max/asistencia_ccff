<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Registro de Asistencia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --surface2:#22263a;
    --accent:  #4fffb0;
    --accent2: #4f8fff;
    --danger:  #ff4f6d;
    --warn:    #ffb74f;
    --text:    #e8eaf0;
    --muted:   #7b80a0;
    --border:  #2e3350;
    --radius:  14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 9px; height: 9px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    letter-spacing: 0.05em;
  }

  #docente-badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  main {
    width: 100%;
    max-width: 480px;
    padding: 18px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Estado docente */
  #estado-docente {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 0.83rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #estado-docente.ok     { border-color: var(--accent);  color: var(--accent);  }
  #estado-docente.error  { border-color: var(--danger);  color: var(--danger);  }
  #estado-docente.loading{ border-color: var(--accent2); color: var(--accent2); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Config */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .config-panel label {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 5px;
  }

  .config-panel select,
  .config-panel input[type="date"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 9px 12px;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .config-panel select:focus,
  .config-panel input[type="date"]:focus { border-color: var(--accent2); }
  .config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Scanner */
  .scanner-wrap {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 1/1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #video { width: 100%; height: 100%; object-fit: cover; display: none; }

  .scanner-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .scan-frame { width: 56%; aspect-ratio: 1/1; position: relative; }
  .scan-frame::before, .scan-frame::after,
  .scan-frame span::before, .scan-frame span::after {
    content: ''; position: absolute;
    width: 22px; height: 22px;
    border-color: var(--accent); border-style: solid;
  }
  .scan-frame::before  { top:0;    left:0;  border-width: 3px 0 0 3px; }
  .scan-frame::after   { top:0;    right:0; border-width: 3px 3px 0 0; }
  .scan-frame span::before { bottom:0; left:0;  border-width: 0 0 3px 3px; }
  .scan-frame span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; }

  .scan-line {
    position: absolute; left:0; right:0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2s ease-in-out infinite;
  }
  @keyframes scan {
    0%   { top: 5%;  opacity: 1; }
    50%  { top: 90%; opacity: 0.7; }
    100% { top: 5%;  opacity: 1; }
  }

  .scanner-idle {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px; color: var(--muted);
  }
  .scanner-idle svg { opacity: 0.35; }
  .scanner-idle p { font-size: 0.82rem; }

  #btn-scan {
    width: 100%; padding: 14px;
    background: var(--accent); color: #0a0f0f;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    border: none; border-radius: var(--radius);
    cursor: pointer; letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.1s;
  }
  #btn-scan:hover  { opacity: 0.88; }
  #btn-scan:active { transform: scale(0.98); }
  #btn-scan:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

  /* Log */
  .log-header { display: flex; justify-content: space-between; align-items: center; padding: 0 2px; }
  .log-header h2 { font-family: 'DM Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  #log-count { background: var(--accent); color: #0a0f0f; font-family: 'DM Mono', monospace; font-size: 0.68rem; border-radius: 999px; padding: 2px 9px; }

  #log-list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; padding-right: 2px; }
  #log-list::-webkit-scrollbar { width: 3px; }
  #log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
  .log-item.pending { border-left: 3px solid var(--accent2); }
  .log-item.sent    { border-left: 3px solid var(--accent); }
  .log-item.dup     { border-left: 3px solid var(--warn); }
  .log-item.error   { border-left: 3px solid var(--danger); }

  .log-name { font-size: 0.86rem; font-weight: 500; }
  .log-meta { font-family: 'DM Mono', monospace; font-size: 0.66rem; color: var(--muted); margin-top: 2px; }

  .log-status { font-family: 'DM Mono', monospace; font-size: 0.66rem; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
  .log-item.pending .log-status { background: #1a2440; color: var(--accent2); }
  .log-item.sent    .log-status { background: #0d2620; color: var(--accent); }
  .log-item.dup     .log-status { background: #2a1e00; color: var(--warn); }
  .log-item.error   .log-status { background: #2a0d14; color: var(--danger); }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 10px 20px;
    font-size: 0.82rem;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0; z-index: 999; max-width: 88vw; text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.ok   { border-color: var(--accent);  color: var(--accent); }
  #toast.err  { border-color: var(--danger);  color: var(--danger); }
  #toast.info { border-color: var(--accent2); color: var(--accent2); }
  #toast.dup  { border-color: var(--warn);    color: var(--warn); }

  canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>REGISTRO DE ASISTENCIA</h1>
  <div id="docente-badge">identificando…</div>
</header>

<main>
  <div id="estado-docente" class="loading">
    <div class="spinner"></div>
    <span id="estado-texto">Identificando usuario de Moodle…</span>
  </div>

  <div class="config-panel">
    <div>
      <label>Centro Formador</label>
      <select id="sel-cf" disabled>
        <option value="">— cargando… —</option>
      </select>
    </div>
    <div class="config-row">
      <div>
        <label>Fecha</label>
        <input type="date" id="sel-fecha">
      </div>
      <div>
        <label>Turno</label>
        <select id="sel-turno">
          <option value="Mañana">Mañana</option>
          <option value="Tarde">Tarde</option>
          <option value="Noche">Noche</option>
        </select>
      </div>
    </div>
  </div>

  <div class="scanner-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="scanner-overlay">
      <div class="scanner-idle" id="idle-msg">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
          <rect x="7" y="7" width="10" height="10" rx="1"/>
        </svg>
        <p>Presioná el botón para escanear</p>
      </div>
      <div class="scan-frame" id="scan-frame" style="display:none">
        <span></span>
        <div class="scan-line"></div>
      </div>
    </div>
  </div>

  <button id="btn-scan" disabled>INICIAR ESCÁNER</button>

  <div class="log-header">
    <h2>Registros de esta sesión</h2>
    <span id="log-count">0</span>
  </div>
  <ul id="log-list"></ul>
</main>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  ÚNICA VARIABLE QUE TENÉS QUE EDITAR
// ══════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/TU_DEPLOYMENT_ID/exec";
// ══════════════════════════════════════════════

let docenteId     = null;
let docenteNombre = "";
let scanning      = false;
let stream        = null;
let lastScanned   = "";
let lastTime      = 0;
const COOLDOWN    = 3000;

// ── Obtener usuario de Moodle (API interna) ────────────────
// Funciona cuando la página está incrustada en Moodle.
// Si se abre fuera de Moodle (testing), cae al fallback con ?d=ID
async function getMoodleUser() {
  try {
    // Método 1: data-userid en el DOM de Moodle
    const userid = parseInt(document.querySelector('[data-userid]')?.dataset?.userid);
    const sesskey = window.M?.cfg?.sesskey;

    if (userid && sesskey) {
      // Tenemos sesskey → podemos consultar la API completa
      const r = await fetch('/lib/ajax/service.php?sesskey=' + sesskey, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify([{
          index: 0,
          methodname: 'core_user_get_users_by_field',
          args: { field: 'id', values: [String(userid)] }
        }])
      });
      const d = await r.json();
      const user = d[0]?.data?.[0];
      if (user) {
        return { id: userid, nombre: user.fullname || `${user.lastname}, ${user.firstname}` };
      }
    }

    // Método 2: solo userid del DOM, sin API (fallback)
    if (userid) {
      return { id: userid, nombre: null }; // el nombre lo trae el Apps Script
    }

    // Método 3: parámetro ?d=ID en la URL (para testing fuera de Moodle)
    const params = new URLSearchParams(window.location.search);
    const did = params.get("d") || params.get("docente_id");
    if (did) {
      return { id: parseInt(did), nombre: null };
    }

    return null;

  } catch (err) {
    console.warn("getMoodleUser error:", err);
    // Último recurso: parámetro URL
    const params = new URLSearchParams(window.location.search);
    const did = params.get("d") || params.get("docente_id");
    return did ? { id: parseInt(did), nombre: null } : null;
  }
}

// ── Init ───────────────────────────────────────────────────
async function init() {
  initFecha();
  initTurno();

  setEstado("loading", "Identificando usuario de Moodle…");

  const moodleUser = await getMoodleUser();

  if (!moodleUser?.id) {
    setEstado("error", "No se pudo identificar el usuario. Abrí esta página desde Moodle.");
    document.getElementById("docente-badge").textContent = "sin sesión";
    document.getElementById("docente-badge").style.color = "var(--danger)";
    return;
  }

  docenteId = moodleUser.id;

  // Si ya tenemos el nombre de Moodle, mostrarlo mientras carga el resto
  if (moodleUser.nombre) {
    document.getElementById("docente-badge").textContent = moodleUser.nombre;
  }

  // Consultar Apps Script para obtener nombre (si no vino de Moodle) y CFs
  await cargarDocente(moodleUser.nombre);
}

async function cargarDocente(nombrePrevio) {
  setEstado("loading", "Cargando centros formadores…");

  try {
    const url = `${APPS_SCRIPT_URL}?action=docente&id=${docenteId}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (!data.encontrado) {
      // Puede estar en Moodle pero no asignado a ningún CF
      setEstado("error", `Usuario no asignado a ningún centro formador. Contactá al coordinador.`);
      document.getElementById("docente-badge").textContent = nombrePrevio || `ID ${docenteId}`;
      document.getElementById("docente-badge").style.color = "var(--warn)";
      return;
    }

    docenteNombre = data.nombre || nombrePrevio || "";
    document.getElementById("docente-badge").textContent = docenteNombre;
    setEstado("ok", `✓ ${docenteNombre}`);

    // Poblar CFs
    const sel = document.getElementById("sel-cf");
    sel.innerHTML = "";
    if (data.cfs.length > 1) {
      const opt = document.createElement("option");
      opt.value = ""; opt.textContent = "— seleccioná —";
      sel.appendChild(opt);
    }
    data.cfs.forEach(cf => {
      const opt = document.createElement("option");
      opt.value = cf; opt.textContent = cf;
      sel.appendChild(opt);
    });
    if (data.cfs.length === 1) sel.value = data.cfs[0];
    sel.disabled = false;

    document.getElementById("btn-scan").disabled = false;

  } catch (err) {
    setEstado("error", "Error de conexión con el servidor. Verificá el internet.");
    console.error(err);
  }
}

function setEstado(tipo, texto) {
  const el = document.getElementById("estado-docente");
  el.className = tipo;
  const spinner = tipo === "loading" ? '<div class="spinner"></div>' : "";
  el.innerHTML = `${spinner}<span>${texto}</span>`;
}

function initFecha() {
  const hoy  = new Date();
  const yyyy = hoy.getFullYear();
  const mm   = String(hoy.getMonth()+1).padStart(2,"0");
  const dd   = String(hoy.getDate()).padStart(2,"0");
  document.getElementById("sel-fecha").value = `${yyyy}-${mm}-${dd}`;
}

function initTurno() {
  const h   = new Date().getHours();
  const sel = document.getElementById("sel-turno");
  if (h >= 13 && h < 19) sel.value = "Tarde";
  else if (h >= 19)       sel.value = "Noche";
  else                    sel.value = "Mañana";
}

// ── Scanner ────────────────────────────────────────────────
const video   = document.getElementById("video");
const canvas  = document.getElementById("canvas");
const ctx     = canvas.getContext("2d", { willReadFrequently: true });
const scanBtn = document.getElementById("btn-scan");
const idleMsg = document.getElementById("idle-msg");
const scanFrm = document.getElementById("scan-frame");

scanBtn.addEventListener("click", () => {
  if (!scanning) startScan(); else stopScan();
});

function startScan() {
  const cf    = document.getElementById("sel-cf").value;
  const fecha = document.getElementById("sel-fecha").value;
  if (!cf)    { showToast("Seleccioná un centro formador", "err"); return; }
  if (!fecha) { showToast("Seleccioná una fecha", "err"); return; }

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(s => {
      stream = s;
      video.srcObject = s;
      video.style.display = "block";
      idleMsg.style.display = "none";
      scanFrm.style.display = "block";
      scanning = true;
      scanBtn.textContent = "DETENER ESCÁNER";
      requestAnimationFrame(tick);
    })
    .catch(() => showToast("No se pudo acceder a la cámara", "err"));
}

function stopScan() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.style.display = "none";
  idleMsg.style.display = "flex";
  scanFrm.style.display = "none";
  scanning = false;
  scanBtn.textContent = "INICIAR ESCÁNER";
}

function tick() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
    if (code) handleQR(code.data);
  }
  requestAnimationFrame(tick);
}

function handleQR(raw) {
  const now = Date.now();
  if (raw === lastScanned && now - lastTime < COOLDOWN) return;
  lastScanned = raw;
  lastTime    = now;

  const estudianteId = raw.trim();
  if (!estudianteId || isNaN(estudianteId)) {
    showToast("QR no reconocido", "err"); return;
  }

  const cf    = document.getElementById("sel-cf").value;
  const fecha = document.getElementById("sel-fecha").value;
  const turno = document.getElementById("sel-turno").value;
  registrar({ estudianteId, cf, fecha, turno });
}

// ── Registro ───────────────────────────────────────────────
let logCount = 0;

async function registrar({ estudianteId, cf, fecha, turno }) {
  const item = addLog({ estudianteId, cf, estado: "pending" });
  showToast(`Escaneando ID ${estudianteId}…`, "info");

  const payload = {
    estudiante_id: estudianteId,
    docente_id:    docenteId,
    docente:       docenteNombre,
    cf, fecha, turno,
    timestamp:     new Date().toISOString()
  };

  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.status === "duplicado") {
      item.classList.replace("pending", "dup");
      item.querySelector(".log-status").textContent = "duplicado";
      showToast("Ya estaba registrado", "dup");
    } else if (data.error) {
      throw new Error(data.error);
    } else {
      // Actualizar el item con el nombre si vino en la respuesta
      if (data.nombreEstudiante) {
        item.querySelector(".log-name").textContent = data.nombreEstudiante;
      }
      item.classList.replace("pending", "sent");
      item.querySelector(".log-status").textContent = "enviado";
      showToast("✓ Registrado", "ok");
      navigator.vibrate && navigator.vibrate(80);
    }
  } catch {
    item.classList.replace("pending", "error");
    item.querySelector(".log-status").textContent = "error";
    showToast("Error al enviar — revisá conexión", "err");
  }
}

function addLog({ estudianteId, cf, estado }) {
  logCount++;
  document.getElementById("log-count").textContent = logCount;
  const li = document.createElement("li");
  li.className = `log-item ${estado}`;
  li.innerHTML = `
    <div>
      <div class="log-name">ID ${estudianteId}</div>
      <div class="log-meta">${cf}</div>
    </div>
    <span class="log-status">enviando…</span>
  `;
  document.getElementById("log-list").prepend(li);
  return li;
}

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = "info") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ""; }, 2800);
}

// ── Boot ───────────────────────────────────────────────────
init();
</script>
</body>
</html>
