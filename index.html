<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistencia IUNIR</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <link rel="apple-touch-icon" href="favicon.ico">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-card { background: var(--card); padding: 15px; border-radius: 12px; width: 100%; max-width: 400px; }
        .badge { background: #334155; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 5px; box-sizing: border-box; }
        #reader { width: 100%; border-radius: 12px; margin-top: 10px; overflow: hidden; }
       #btn-scan { 
        display: none; /* Oculto por defecto */
        width: 100%; 
        padding: 15px; 
        background: var(--accent); 
        color: white; 
        border: none; 
        border-radius: 8px; 
        font-weight: bold; 
        margin-top: 15px; 
        cursor: pointer; 
    }
    #sel-cf-container { display: none; margin-top: 10px; }
        .status-box { margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 0.85rem; text-align: center; }
        .loading { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .ok { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .err { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    </style>
    <div id="sel-cf-container">
    <label style="font-size:0.8rem; color:#94a3b8;">Centro Formador</label>
    <select id="sel-cf"></select>
</div>
<button id="btn-scan" onclick="startScanner()">INICIAR ESCÁNER</button>
</head>
<body>

<div class="app-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; font-size:1rem; color:var(--accent);">ASISTENCIA IUNIR</h2>
        <span id="docente-badge" class="badge">ID: ?</span>
    </div>

    <label style="font-size:0.8rem; color:#94a3b8;">Fecha</label>
    <input type="date" id="sel-fecha">

    <label style="font-size:0.8rem; color:#94a3b8; display:block; margin-top:10px;">Centro Formador</label>
    <select id="sel-cf" disabled><option>Cargando centros...</option></select>

    <button id="btn-scan" onclick="startScanner()" disabled>INICIAR ESCÁNER</button>
    <div id="reader"></div>
    <div id="status" class="status-box">Iniciando...</div>
</div>

<script>
// USAR TU URL DE GOOGLE APPS SCRIPT
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbziUbj_pUf-h7D4F2Pmm7pXMaXR3Lf6VjwGPTSugyNgE9PKwVkD7HQcWRWZxz11Wa3n/exec";
let docenteId = null;
let html5QrCode = null;

async function init() {
    document.getElementById("sel-fecha").value = new Date().toISOString().split('T')[0];
    const params = new URLSearchParams(window.location.search);
    docenteId = params.get("id");

    if (docenteId) {
        document.getElementById("docente-badge").textContent = "ID: " + docenteId;
        cargarCentros();
    } else {
        updateStatus("err", "Error: No se detectó ID de docente.");
    }
}

async function cargarCentros() {
    try {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=docente&id=${docenteId}`);
        const data = await res.json();
        
        if (data.encontrado) {
            const sel = document.getElementById("sel-cf");
            sel.innerHTML = "";
            data.cfs.forEach(c => {
                let opt = document.createElement("option");
                opt.value = opt.textContent = c;
                sel.appendChild(opt);
            });
            // Mostramos el selector y el botón
            document.getElementById("sel-cf-container").style.display = "block";
            document.getElementById("btn-scan").style.display = "block";
            updateStatus("ok", "✓ Docente identificado");
        } else {
            updateStatus("err", "El ID " + docenteId + " no tiene centros asignados.");
        }
    } catch (e) {
        updateStatus("err", "Error de conexión con el script.");
    }
}
    
function startScanner() {
    if (html5QrCode) { html5QrCode.stop().then(() => location.reload()); return; }
    
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: 250 },
        (text) => { html5QrCode.stop(); enviarAsistencia(text); },
        (msg) => {}
    ).catch(() => updateStatus("err", "Error de cámara. Permití el acceso en el navegador."));
}

async function enviarAsistencia(alumnoId) {
    updateStatus("loading", "Registrando...");
    const centro = document.getElementById("sel-cf").value;
    const fecha = document.getElementById("sel-fecha").value;
    
    // Estos nombres (idDocente, idAlumno, etc.) deben coincidir con el script de arriba
    const url = `${APPS_SCRIPT_URL}?action=asistencia&idDocente=${docenteId}&idAlumno=${alumnoId}&centro=${encodeURIComponent(centro)}&fecha=${fecha}`;
    
    try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.ok) {
            updateStatus("ok", "✓ ¡Presente registrado!");
            setTimeout(() => { location.reload(); }, 3000);
        } else {
            updateStatus("err", "Error en hoja: " + data.error);
        }
    } catch (e) {
        updateStatus("err", "Error de red al guardar");
    }
}

function updateStatus(c, t) {
    const s = document.getElementById("status");
    s.className = "status-box " + c;
    s.textContent = t;
}

init();
</script>
</body>
</html>
