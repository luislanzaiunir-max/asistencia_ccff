<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistencia IUNIR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-card { background: var(--card); padding: 15px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .badge { background: #334155; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: #94a3b8; }
        select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        /* Área de escaneo optimizada */
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-top: 10px; }
        #btn-scan { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #btn-scan:disabled { background: #475569; opacity: 0.5; }
        
        .status-box { margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 0.85rem; text-align: center; }
        .loading { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .ok { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .err { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    </style>
</head>
<body>

<div class="app-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; font-size:1rem; color:var(--accent);">ASISTENCIA IUNIR</h2>
        <span id="docente-badge" class="badge">Cargando...</span>
    </div>

    <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="sel-fecha">
    </div>

    <div class="form-group">
        <label>Centro Formador</label>
        <select id="sel-cf" disabled>
            <option>Cargando centros...</option>
        </select>
    </div>

    <button id="btn-scan" onclick="startScanner()" disabled>INICIAR ESCÁNER</button>
    
    <div id="reader"></div>
    <div id="status" class="status-box">Iniciando...</div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlwxnVhYD_0dv-xXWJUZf9mC4DZGhSl0gPH9ZUXmwgLaPuQ9wZVfGdzfyoJnClea4Y/exec"; // REEMPLAZAR POR TU URL
let docenteId = null;
let html5QrCode = null;

async function init() {
    document.getElementById("sel-fecha").value = new Date().toISOString().split('T')[0];
    const params = new URLSearchParams(window.location.search);
    docenteId = params.get("id");

    if (docenteId) {
        document.getElementById("docente-badge").textContent = "ID: " + docenteId;
        await cargarCentros();
    } else {
        updateStatus("err", "Falta ID de docente");
    }
}

async function cargarCentros() {
    try {
        updateStatus("loading", "Buscando centros...");
        const res = await fetch(`${APPS_SCRIPT_URL}?action=docente&id=${docenteId}`);
        const data = await res.json();

        const sel = document.getElementById("sel-cf");
        sel.innerHTML = "";

        if (data.encontrado && data.cfs.length > 0) {
            data.cfs.forEach(c => {
                let opt = document.createElement("option");
                opt.value = opt.textContent = c;
                sel.appendChild(opt);
            });
            sel.disabled = false;
            document.getElementById("btn-scan").disabled = false;
            updateStatus("ok", "✓ Sistema listo");
        } else {
            updateStatus("err", "No tienes centros asignados");
        }
    } catch (e) {
        updateStatus("err", "Error de conexión");
    }
}

function startScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => { location.reload(); });
        return;
    }

    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    html5QrCode.start(
        { facingMode: "environment" }, 
        config,
        (decodedText) => { // ÉXITO
            html5QrCode.stop();
            enviarAsistencia(decodedText);
        },
        (errorMessage) => { /* Escaneando... */ }
    ).catch(err => {
        updateStatus("err", "Error cámara: Asegúrate de dar permisos");
        console.error(err);
    });
}

async function enviarAsistencia(alumnoId) {
    updateStatus("loading", "Registrando...");
    const centro = document.getElementById("sel-cf").value;
    const fecha = document.getElementById("sel-fecha").value;

    try {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=asistencia&idDocente=${docenteId}&idAlumno=${alumnoId}&centro=${centro}&fecha=${fecha}`);
        const data = await res.json();
        if (data.ok) {
            updateStatus("ok", "✓ ¡Presente: " + alumnoId + "!");
            setTimeout(() => { location.reload(); }, 3000);
        }
    } catch (e) {
        updateStatus("err", "Error al guardar");
    }
}

function updateStatus(clase, texto) {
    const s = document.getElementById("status");
    s.className = `status-box ${clase}`;
    s.textContent = texto;
}

init();
</script>

</body>
</html>
