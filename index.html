<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia IUNIR</title>
    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --success: #22c55e; --error: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-card { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.1rem; margin: 0; color: var(--accent); letter-spacing: 1px; }
        .badge { background: #334155; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-box { padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid transparent; transition: 0.3s; }
        .loading { background: rgba(59, 130, 246, 0.1); border-color: var(--accent); color: var(--accent); }
        .ok { background: rgba(34, 197, 94, 0.1); border-color: var(--success); color: var(--success); }
        .err { background: rgba(239, 68, 68, 0.1); border-color: var(--error); color: var(--error); }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; margin-top: 10px; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        .scanner-wrap { position: relative; width: 100%; aspect-ratio: 1; background: #000; border-radius: 12px; overflow: hidden; margin: 20px 0; border: 2px solid #334155; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }
        .placeholder-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; color: #64748b; padding: 20px; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        button:disabled { background: #334155; color: #64748b; }
        .log-header { display: flex; justify-content: space-between; margin-top: 25px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .log-list { list-style: none; padding: 0; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .log-item { background: #334155; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .item-id { font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>
    <div class="app-card">
        <header>
            <h1>ASISTENCIA IUNIR</h1>
            <div id="docente-badge" class="badge">S/N</div>
        </header>

        <div id="status" class="status-box loading">Buscando sesión en Moodle...</div>

        <label>Centro Formador</label>
        <select id="sel-cf" disabled><option>Cargando...</option></select>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>Fecha</label><input type="date" id="sel-fecha"></div>
            <div style="flex: 1;"><label>Turno</label>
                <select id="sel-turno">
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche">Noche</option>
                </select>
            </div>
        </div>

        <div class="scanner-wrap">
            <video id="video" playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="placeholder" class="placeholder-msg">La cámara se activará al iniciar el escáner</div>
        </div>

        <button id="btn-scan" disabled>INICIAR ESCÁNER</button>

        <div class="log-header">
            <span>Registros de hoy</span>
            <span id="log-count">0</span>
        </div>
        <ul id="log-list" class="log-list"></ul>
    </div>

    <script>
    // --- VARIABLES GLOBALES ---
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlwxnVhYD_0dv-xXWJUZf9mC4DZGhSl0gPH9ZUXmwgLaPuQ9wZVfGdzfyoJnClea4Y/exec"; 
let docenteId = null;
let docenteNombre = "";

// 1. FUNCIÓN DE INICIO (Se ejecuta al cargar la página)
async function init() {
    document.getElementById("sel-fecha").value = new Date().toISOString().split('T')[0];
    updateStatus("loading", "Identificando sesión...");

    // Intentar obtener ID desde la URL (Método seguro para Iframes)
    const params = new URLSearchParams(window.location.search);
    const urlId = params.get("id");

    if (urlId) {
        docenteId = urlId;
        docenteNombre = "Docente (ID: " + urlId + ")";
        document.getElementById("docente-badge").textContent = docenteNombre;
        // Si tenemos ID, procedemos a cargar los centros
        await cargarCentrosDesdeGoogle();
    } else {
        updateStatus("err", "No se detectó ID en la URL. Usa: ...html?id=6");
    }
}

// 2. LA FUNCIÓN QUE BUSCABAS: Cargar Centros desde Google
async function cargarCentrosDesdeGoogle() {
    try {
        updateStatus("loading", "Buscando centros asignados...");
        
        // El fetch lleva el ID y un 'cachebuster' para que Google no devuelva datos viejos
        const url = `${APPS_SCRIPT_URL}?action=docente&id=${docenteId}&t=${Date.now()}`;
        const res = await fetch(url);
        const data = await res.json();

        const sel = document.getElementById("sel-cf");
        sel.innerHTML = ""; // Limpiar el selector

        if (data.encontrado && data.cfs.length > 0) {
            data.cfs.forEach(nombreCentro => {
                let opt = document.createElement("option");
                opt.value = nombreCentro;
                opt.textContent = nombreCentro;
                sel.appendChild(opt);
            });
            sel.disabled = false;
            document.getElementById("btn-scan").disabled = false;
            updateStatus("ok", "✓ Centros listos para trabajar");
        } else {
            updateStatus("err", `ID ${docenteId} no tiene centros en el Excel.`);
        }
    } catch (e) {
        console.error("Error en fetch:", e);
        updateStatus("err", "Error de conexión con Google Sheets.");
    }
}

// 3. FUNCIÓN DE ESTADO (Para el recuadro de colores)
function updateStatus(clase, texto) {
    const s = document.getElementById("status");
    s.className = `status-box ${clase}`;
    s.textContent = texto;
}

   init();
    </script>
</body>
</html>
